name: .NET

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  DOTNET_CLI_TELEMETRY_OPTOUT: 1
  DOTNET_NOLOGO: 1

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        global-json-file: global.json

    - name: Restore dependencies
      run: dotnet restore

    - name: Build
      run: dotnet build --configuration Release --no-restore

    - name: Pack Bodiless
      id: pack
      shell: bash
      run: |
        set -euo pipefail
        output_directory="$GITHUB_WORKSPACE/artifacts/packages"
        rm -rf "$output_directory"
        mkdir -p "$output_directory"
        dotnet pack src/Bodiless/Bodiless.csproj --configuration Release --no-build --output "$output_directory"
        package_path="$(find "$output_directory" -maxdepth 1 -type f -name '*.nupkg' ! -name '*.symbols.nupkg' | head -n 1)"
        if [ -z "$package_path" ]; then
          echo "No NuGet package was produced." >&2
          exit 1
        fi
        echo "package_path=$package_path" >> "$GITHUB_OUTPUT"

    - name: Test
      run: dotnet test --configuration Release --no-build --verbosity normal
      env:
        BODILESS_NUPKG_PATH: ${{ steps.pack.outputs.package_path }}

    - name: Publish
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      run: dotnet nuget push "${{ steps.pack.outputs.package_path }}" --api-key "${{ secrets.NUGET_API_KEY }}" --source "https://api.nuget.org/v3/index.json" --skip-duplicate
